spring:
  application:
    name: Spring-Security;

  datasource:
    driver-class-name:com.mysql.cj.jdcb.Driver
    url:{DB_URL}
    username:{DB_USERNAME}
    password:{DB_PASSWORD}

  jpa:
    show-sql:
        true
    hibernate:
      ddl-auto:validate

  flyway:
    locations:
      classpath: db/migration
    enable:
      true